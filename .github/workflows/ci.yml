name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (with coverage floor)
        run: npm run test:ci

      # Bundle the app for the target platform via Metro — proves every screen/route
      # compiles and bundles (no Android SDK needed; this does not build native code).
      - name: Build (Android JS bundle)
        run: npx expo export --platform android
